<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageRail / 画轨</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>ImageRail / 画轨</h1>
          <p id="projectPathText">尚未选择项目文件夹</p>
        </div>
        <div class="toolbar">
          <button id="chooseProjectButton" type="button">选择项目文件夹</button>
          <button id="renameProjectButton" type="button" disabled>重命名图片文件夹</button>
          <button id="newTrackButton" type="button" disabled>新建轨道</button>
          <button id="saveProjectButton" type="button" disabled>保存项目</button>
        </div>
      </header>

      <main class="workspace">
        <section class="rail-board">
          <div class="empty-state" id="emptyState">
            <h2>先选择一个项目文件夹</h2>
            <p>应用会在该文件夹内创建 images 图片文件夹；你也可以之后把 images 重命名为分镜头、角色图等。</p>
          </div>
          <div class="tracks" id="tracks"></div>
        </section>

        <aside class="detail-panel">
          <h2>详情</h2>
          <div id="detailContent" class="detail-empty">选择一张图片后，这里会显示文件名、版本、备注和状态。</div>
        </aside>
      </main>
    </div>

    <div class="preview-modal" id="previewModal" hidden>
      <button id="closePreviewButton" class="close-preview" type="button">关闭</button>
      <img id="previewImage" alt="图片预览" />
    </div>

    <div class="rename-modal" id="renameModal" hidden>
      <form class="rename-dialog" id="renameForm">
        <h2 id="renameTitle">重命名</h2>
        <p id="renameDescription"></p>
        <input id="renameInput" type="text" autocomplete="off" />
        <div class="rename-actions">
          <button id="cancelRenameButton" type="button">取消</button>
          <button id="confirmRenameButton" type="submit">确认</button>
        </div>
      </form>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
