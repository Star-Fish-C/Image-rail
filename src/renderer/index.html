<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImageRail / 画轨</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="window-drag-strip" data-tauri-drag-region></div>
      <header class="topbar" data-tauri-drag-region>
        <div class="title-area" data-tauri-drag-region>
          <h1>ImageRail / 画轨</h1>
          <p id="projectPathText">尚未选择项目文件夹</p>
        </div>
        <div class="toolbar">
          <button id="chooseProjectButton" type="button">选择项目</button>
          <button id="newTrackButton" type="button" disabled>新建轨道</button>
          <button id="saveProjectButton" type="button" disabled>保存项目</button>
        </div>
        <div class="window-controls">
          <button id="minimizeWindowButton" type="button" aria-label="最小化">-</button>
          <button id="maximizeWindowButton" type="button" aria-label="最大化或还原">□</button>
          <button id="closeWindowButton" type="button" aria-label="关闭">×</button>
        </div>
      </header>

      <main class="workspace">
        <section class="rail-board">
          <div class="empty-state" id="emptyState">
            <h2>先选择或创建一个项目</h2>
            <p>点击顶部“选择项目”，从已创建项目中打开，或选择一个位置创建新项目。</p>
          </div>
          <div class="tracks" id="tracks"></div>
        </section>

        <div id="compareResizer" class="compare-resizer" aria-label="调整右侧查看区域宽度"></div>
        <aside class="compare-panel">
          <div class="compare-header">
            <div>
              <span>预览 / 对比</span>
              <h2>图片查看</h2>
            </div>
            <div class="compare-tools">
              <button id="zoomOutButton" type="button" disabled title="缩小">-</button>
              <button id="zoomInButton" type="button" disabled title="放大">+</button>
              <button id="pinCompareButton" type="button" disabled>固定对比</button>
            </div>
          </div>
          <div id="compareContent" class="compare-empty">选择一张图片后，这里会显示大图。固定一张图后，再选择另一张图即可上下对比。</div>
        </aside>
      </main>
    </div>

    <div class="preview-modal" id="previewModal" hidden>
      <button id="closePreviewButton" class="close-preview" type="button">关闭</button>
      <img id="previewImage" alt="图片预览" />
    </div>

    <div class="rename-modal" id="renameModal" hidden>
      <form class="rename-dialog" id="renameForm">
        <h2 id="renameTitle">重命名</h2>
        <p id="renameDescription"></p>
        <input id="renameInput" type="text" autocomplete="off" />
        <div class="rename-actions">
          <button id="cancelRenameButton" type="button">取消</button>
          <button id="confirmRenameButton" type="submit">确认</button>
        </div>
      </form>
    </div>

    <div class="project-modal" id="projectModal" hidden>
      <section class="project-dialog">
        <div class="project-dialog-header">
          <div>
            <h2>选择项目</h2>
            <p>打开已创建项目，或选择一个位置创建新项目。</p>
          </div>
          <button id="closeProjectModalButton" type="button">关闭</button>
        </div>
        <div id="projectList" class="project-list"></div>
        <div class="project-dialog-actions">
          <button id="createProjectButton" type="button">选择位置创建项目</button>
        </div>
      </section>
    </div>

    <div class="app-message" id="appMessage" hidden>
      <section class="app-message-dialog">
        <p id="appMessageText"></p>
        <button id="appMessageCloseButton" type="button">知道了</button>
      </section>
    </div>

    <div class="context-menu" id="contextMenu" hidden>
      <button id="copyImageButton" type="button">复制</button>
      <button id="pasteImageButton" type="button">粘贴</button>
      <button id="revealImageButton" type="button">在文件夹中打开</button>
    </div>

    <script src="./tauri-api.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
